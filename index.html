<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khanq IT | Premium Design</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.2);
            --bg-dark: #080a11;
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* Hiệu ứng nền mờ ảo */
        .blob {
            position: fixed; width: 500px; height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1; filter: blur(80px);
        }

        /* ===== SIDEBAR ===== */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0; height: 100vh;
        }

        .logo {
            font-size: 1.5rem; font-weight: 800; color: #fff;
            margin-bottom: 40px; display: flex; align-items: center; gap: 12px;
        }
        .logo i { color: var(--accent); font-size: 1.8rem; }

        .nav-label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); margin: 20px 0 10px 10px; letter-spacing: 1px; font-weight: 700; }
        
        .nav-item {
            padding: 12px 16px; border-radius: 12px; color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; gap: 12px;
            text-decoration: none; font-weight: 500; margin-bottom: 4px;
        }
        .nav-item:hover, .nav-item.active { background: var(--card-bg); color: var(--accent); }
        .nav-item i { font-size: 18px; }

        /* ===== MAIN CONTENT ===== */
        main { flex: 1; padding: 40px 60px; max-width: 1400px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .search-box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 12px 20px; border-radius: 15px; width: 400px;
            display: flex; align-items: center; gap: 12px;
        }
        .search-box input {
            background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 14px;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-text { text-align: right; }
        .user-text p { font-size: 14px; font-weight: 600; }
        .user-text span { font-size: 12px; color: var(--text-secondary); }

        /* ===== CONTENT GRID ===== */
        .section-title { font-size: 24px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .app-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
        }

        .app-icon {
            width: 56px; height: 56px; background: rgba(255,255,255,0.05);
            border-radius: 16px; margin-bottom: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--accent);
        }

        .app-card h3 { font-size: 18px; margin-bottom: 8px; }
        .app-card .tags { display: flex; gap: 8px; margin-bottom: 20px; }
        .tag { font-size: 11px; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; color: var(--text-secondary); }

        .app-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);
        }

        .btn-download {
            background: var(--accent); color: #000; font-weight: 700;
            padding: 10px 20px; border-radius: 12px; border: none;
            cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px;
        }
        .btn-download:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 15px var(--accent-glow); }

        /* Loading Animation */
        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Mobile Responsive */
        @media (max-width: 992px) {
            aside { display: none; }
            main { padding: 20px; }
            .search-box { width: 100%; }
        }
        .mobile-nav {
    display: none;
}

.mobile-support {
    display: none;
}

@media (max-width: 768px) {
    .mobile-support {
        display: block;
        position: fixed;
        bottom: 85px;
        right: 16px;
        z-index: 1000;
    }

    .support-toggle {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        color: #000;
        font-size: 22px;
        box-shadow: 0 0 20px var(--accent-glow);
    }

    .support-panel {
        position: absolute;
        bottom: 70px;
        right: 0;
        background: rgba(15,23,42,0.95);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 14px;
        width: 200px;
        opacity: 0;
        transform: scale(0.9);
        pointer-events: none;
    }

    .support-panel.active {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
    }

    .support-panel p {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--text-secondary);
    }

    .support-actions {
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .support-actions i {
        font-size: 22px;
    }

    .support-actions img {
        width: 22px;
        height: 22px;
    }
}
   </style>
</head>
<body>

    <div class="blob" style="top: -100px; right: -100px;"></div>
    <div class="blob" style="bottom: -100px; left: -100px; background: rgba(99, 102, 241, 0.1);"></div>

    <aside>
        <div class="logo">
            <i class="fas fa-layer-group"></i>
            <span>SoftHub</span>
        </div>

        <nav id="folder-list">
            <span class="nav-label">Phân loại</span>
            <a href="#" class="nav-item active" onclick="filterByFolder('all')">
                <i class="fas fa-grid-2"></i> Tất cả ứng dụng
            </a>
            </nav>

        <div style="margin-top: auto; padding: 20px; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color);">
    <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; font-weight: 600;">Hỗ trợ kỹ thuật</p>
    <div style="display: flex; gap: 20px; align-items: center;">
        
        <a href="https://facebook.com/atm1111z" target="_blank" class="contact-icon" title="Facebook">
            <i class="fab fa-facebook" style="font-size: 24px; color: #1877F2;"></i>
        </a>
        
        <a href="https://zalo.me/0399667472" target="_blank" class="contact-icon" title="Zalo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt="Zalo" style="width: 24px; height: 24px;">
        </a>

        <a href="tel:0399667472" class="contact-icon" title="Gọi điện">
            <i class="fas fa-phone-alt" style="font-size: 20px; color: var(--accent);"></i>
        </a>
    </div>
</div>
</div>
    </aside>

    <main>
        <header>
            <div class="search-box">
                <i class="fas fa-search" style="color: var(--text-secondary);"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm phần mềm hoặc bộ công cụ...">
            </div>

            <div class="user-info">
                <div class="user-text">
                    <p>Lê Quốc Khang</p>
                    <span>Administrator</span>
                </div>
                <div style="width: 45px; height: 45px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000;">
                    QK
                </div>
            </div>
        </header>

        <section id="content-area">
            <h2 class="section-title" id="current-category">Tất cả ứng dụng</h2>
            <div class="app-grid" id="app-list">
                </div>
        </section>

        <footer style="margin-top: 80px; text-align: center; color: var(--text-secondary); font-size: 13px;">
            &copy; 2026 SoftHub Premium • Được phát triển bởi Lê Quốc Khang
        </footer>
    </main>

<script type="module">
    // 1. Thêm "doc" vào danh sách import ở đây
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, increment, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyCySHDY4nar2nzG6WdYMRDM8Y0aovVbJHQ",
        projectId: "kkkk-29e4e"
    });
    const db = getFirestore(app);

    let allData = [];

    const fetchApps = async () => {
        const q = query(collection(db, "download"), orderBy("time", "desc"));
        const snapshot = await getDocs(q);
        // 2. SỬA TẠI ĐÂY: Phải lấy doc.id thì mới đếm lượt tải được
        allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderFolders();
        renderApps(allData);
    };

    const renderFolders = () => {
        const folders = [...new Set(allData.map(item => item.folder || "Khác"))];
        const nav = document.getElementById('folder-list');
        nav.innerHTML = '<span class="nav-label">Phân loại</span><a href="#" class="nav-item active" onclick="filterByFolder(\'all\')"><i class="fas fa-grid-2"></i> Tất cả ứng dụng</a>';
        
        folders.forEach(f => {
            const link = document.createElement('a');
            link.className = 'nav-item';
            link.innerHTML = `<i class="fas fa-folder"></i> ${f}`;
            link.onclick = (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                filterByFolder(f);
            };
            nav.appendChild(link);
        });
    };

    const renderApps = (items) => {
        const grid = document.getElementById('app-list');
        grid.innerHTML = items.length ? "" : "<p>Không tìm thấy ứng dụng...</p>";

        items.forEach((appItem, index) => {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.05}s`;
            card.innerHTML = `
                <div class="app-icon">
                    <i class="${getIcon(appItem.name)}"></i>
                </div>
                <h3>${appItem.name}</h3>
                <div class="tags">
                    <span class="tag">${appItem.type || 'Phần mềm'}</span>
                    <span class="tag">${appItem.os || 'Windows'}</span>
                </div>
                <div class="app-footer">
                    <span style="font-size: 12px; color: var(--text-secondary);"><i class="fas fa-check-circle"></i> Verified</span>
                    <button class="btn-download" onclick="downloadHandler('${appItem.id}', '${appItem.link}', this)">
                        <i class="fas fa-download"></i> Tải xuống
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    };

    const getIcon = (name) => {
        const n = name.toLowerCase();
        if(n.includes('office')) return 'fab fa-microsoft';
        if(n.includes('adobe') || n.includes('photoshop')) return 'fas fa-palette';
        if(n.includes('net') || n.includes('visual')) return 'fas fa-code';
        if(n.includes('directx') || n.includes('game')) return 'fas fa-gamepad';
        return 'fas fa-box-open';
    }

    window.filterByFolder = (folder) => {
        document.getElementById('current-category').innerText = folder === 'all' ? 'Tất cả ứng dụng' : folder;
        const filtered = folder === 'all' ? allData : allData.filter(i => i.folder === folder);
        renderApps(filtered);
    };

    // HÀM XỬ LÝ TẢI VÀ ĐẾM LƯỢT
    window.downloadHandler = async (id, link, btn) => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Đang tải...`;
        
        try {
            // Thực hiện cộng 1 vào cột downloads trên Firebase
            const appRef = doc(db, "download", id);
            await updateDoc(appRef, {
                downloads: increment(1)
            });
        } catch (err) {
            console.error("Lỗi đếm lượt tải:", err);
        }

        // Mở link tải cho khách
        window.open(link, '_blank');
        
        // Reset lại nút bấm
        setTimeout(() => {
            btn.innerHTML = originalText;
        }, 1000);
    };

    document.getElementById('searchInput').oninput = (e) => {
        const kw = e.target.value.toLowerCase();
        const filtered = allData.filter(i => 
            i.name.toLowerCase().includes(kw) || 
            (i.folder && i.folder.toLowerCase().includes(kw))
        );
        renderApps(filtered);
    };

    fetchApps();
    function toggleSupport() {
    document.getElementById('supportPanel').classList.toggle('active');
}
</script>

<style>
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
</style>
<!-- Mobile Support -->
<div class="mobile-support">
    <button class="support-toggle" onclick="toggleSupport()">
        <i class="fas fa-headset"></i>
    </button>

    <div class="support-panel" id="supportPanel">
        <p>Hỗ trợ kỹ thuật</p>
        <div class="support-actions">
            <a href="https://facebook.com/atm1111z" target="_blank">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://zalo.me/0399667472" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
            </a>
            <a href="tel:0399667472">
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>
    </div>
</div>
</body>
</html>
