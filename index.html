<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kho Ứng Dụng | IT Tâm Trí Đồng Tháp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg) 70%);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .title {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .sub { font-size: 0.95rem; color: var(--text-dim); letter-spacing: 0.5px; }
        .sub b { color: var(--primary); font-weight: 600; }

        /* ===== SEARCH ===== */
        .search-container {
            max-width: 500px;
            margin: 0 auto 50px;
            position: relative;
            padding: 0 20px;
        }
        .search-container input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: #fff;
            font-size: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* ===== GRID & CARD ===== */
        .container { max-width: 1200px; margin: auto; padding: 0 25px 80px; }
        
        .list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .item {
            position: relative;
            padding: 28px;
            border-radius: 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .item:hover {
            transform: translateY(-8px);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .item b {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: block;
        }

        /* ===== BADGES ===== */
        .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* ===== BUTTONS ===== */
        .btn {
            margin-top: auto;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            background: var(--primary);
            color: #052e16;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #34d399;
            filter: brightness(1.1);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Loading State */
        .btn.loading { opacity: 0.7; pointer-events: none; }

        /* ===== FAB ===== */
        .fab { position: fixed; right: 30px; bottom: 30px; z-index: 100; }
        .fab-main {
            width: 60px; height: 60px; border-radius: 20px;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 20px var(--primary-glow);
        }
        .fab-menu {
            position: absolute; bottom: 80px; right: 0;
            display: flex; flex-direction: column; gap: 15px;
            opacity: 0; transform: translateY(20px); pointer-events: none;
        }
        .fab.active .fab-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .fab-item {
            width: 50px; height: 50px; border-radius: 15px;
            background: var(--card-bg); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .fab-item img { width: 24px; }

        .footer { padding: 40px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }

        /* Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item { animation: fadeInUp 0.5s ease backwards; }
        .folder-header {
    background: rgba(16, 185, 129, 0.1);
    padding: 10px 16px;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    font-weight: 600;
    color: var(--primary);
    border: 1px solid var(--primary-glow);
}
.folder-header:hover {
    background: rgba(16, 185, 129, 0.2);
}
.folder-content {
    margin-top: 10px;
}
/* Đảm bảo nhóm thư mục chiếm toàn bộ chiều rộng */
.folder-group {
    grid-column: 1 / -1; 
    margin-bottom: 30px;
}

/* Header của thư mục */
.folder-header {
    background: rgba(16, 185, 129, 0.1);
    padding: 15px 20px;
    border-radius: 16px;
    cursor: pointer;
    margin-bottom: 20px;
    font-weight: 600;
    color: var(--primary);
    border: 1px solid var(--primary-glow);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* Quan trọng: Đây là lưới bên trong mỗi thư mục */
.folder-inner-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
}

.folder-content {
    transition: all 0.3s ease;
}

    </style>
</head>

<body>

<div class="header">
    <div class="title">Trung Tâm Phần Mềm</div>
    <div class="sub">Quản trị bởi <b>Lê Quốc Khang</b> • IT Tâm Trí Đồng Tháp</div>
</div>

<div class="search-container">
    <input id="search" type="text" placeholder="Tìm kiếm ứng dụng (Ví dụ: Office, .NET,...)">
</div>

<div class="container">
    <div id="list" class="list">
        </div>
</div>

<div class="footer">
    &copy; 2026 • Design by Lê Quốc Khang with ❤️
</div>

<div class="fab" id="fab">
    <div class="fab-menu">
        <a class="fab-item" href="https://zalo.me/0399667472" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt="Zalo"></a>
        <a class="fab-item" href="https://facebook.com/atm1111z" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Facebook_icon.svg" alt="FB"></a>
        <a class="fab-item" href="tel:0399667472" style="text-decoration: none; font-size: 20px;">📞</a>
    </div>
    <div class="fab-main" onclick="document.getElementById('fab').classList.toggle('active')">
        <span style="font-size: 24px;">💬</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyCySHDY4nar2nzG6WdYMRDM8Y0aovVbJHQ",
    projectId: "kkkk-29e4e"
});
const db = getFirestore(app);

const list = document.getElementById("list");
const search = document.getElementById("search");
let data = [];

const render = (items) => {
    const keyword = search.value.trim().toLowerCase();
    list.innerHTML = items.length ? "" : "<p style='text-align:center; grid-column: 1/-1; opacity: 0.5;'>Không tìm thấy ứng dụng phù hợp...</p>";

    const grouped = {};
    items.forEach(i => {
        const folder = i.folder?.trim() || "Khác";
        if (!grouped[folder]) grouped[folder] = [];
        grouped[folder].push(i);
    });

    Object.entries(grouped).forEach(([folder, apps]) => {
        const folderId = folder.replace(/\s+/g, "_");
        
        // Nếu đang tìm kiếm thì luôn mở (block), nếu không thì mặc định mở (hoặc ẩn tùy bạn)
        const displayStyle = keyword.length > 0 ? "block" : "none"; 

        const section = document.createElement("div");
        section.className = "folder-group";
        section.innerHTML = `
            <div class="folder-header" onclick="toggleFolder('${folderId}')">
                <h3 style="margin: 0;">📁 ${folder} (${apps.length})</h3>
                <span id="icon-${folderId}">${displayStyle === 'block' ? '▲' : '▼'}</span>
            </div>
            <div class="folder-content" id="folder-${folderId}" style="display: ${displayStyle};">
                <div class="folder-inner-list">
                    ${apps.map((i, index) => `
                        <div class="item" style="animation-delay: ${index * 0.05}s">
                            <b>${i.name}</b>
                            <div class="meta">
                                ${i.type ? `<span class="badge">${i.type}</span>` : ""}
                                ${i.os ? `<span class="badge">${i.os}</span>` : ""}
                                ${i.source ? `<span class="badge">Official</span>` : ""}
                            </div>
                            <button class="btn" onclick="downloadApp('${i.link}', this)">
                                <span class="icon">📥</span> Tải xuống
                            </button>
                        </div>
                    `).join("")}
                </div>
            </div>
        `;
        list.appendChild(section);
    });
};

(async () => {
    try {
        const q = query(collection(db, "download"), orderBy("time", "desc"));
        const s = await getDocs(q);
        data = s.docs.map(d => d.data());
        render(data);
    } catch (err) {
        list.innerHTML = "Lỗi tải dữ liệu. Vui lòng kiểm tra cấu hình Firebase.";
    }
})();

// Logic tìm kiếm đa năng
search.oninput = () => {
    const keyword = search.value.toLowerCase();
    const filtered = data.filter(i => {
        const nameMatch = i.name.toLowerCase().includes(keyword);
        const folderMatch = (i.folder || "").toLowerCase().includes(keyword);
        return nameMatch || folderMatch;
    });
    render(filtered);
};

window.toggleFolder = (id) => {
    const el = document.getElementById("folder-" + id);
    const icon = document.getElementById("icon-" + id);
    if (el) {
        const isHidden = el.style.display === "none";
        el.style.display = isHidden ? "block" : "none";
        if(icon) icon.innerText = isHidden ? "▲" : "▼";
    }
};

window.downloadApp = (link, btn) => {
    btn.classList.add("loading");
    btn.innerHTML = "⌛ Đang kết nối...";
    setTimeout(() => {
        window.open(link, "_blank");
        btn.classList.remove("loading");
        btn.innerHTML = "📥 Tải xuống";
    }, 800);
};

</script>

</body>
</html>
